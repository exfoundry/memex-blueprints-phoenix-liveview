# Per-source hooks for phoenix-liveview blueprints.
# Blueprint ids resolve against the `phoenix-liveview` source prefix.
# First match wins — more specific patterns go before general ones.

# ---------- LiveViews ----------
#
# Implementation + testing rules live in a single blueprint. Both
# *_live.ex and *_live_test.exs match the same file.

[[pre-write]]
pattern   = "_live(_test)?\\.(ex|exs)$"
blueprint = "phoenix-liveview/core/liveview"

# ---------- Components ----------

[[pre-write]]
pattern   = "lib/platform_web/components/[^/]+\\.ex$"
blueprint = "phoenix-liveview/core/components"

# ---------- Controllers ----------
#
# Non-HTML endpoints only (JSON/text/XML APIs, redirects, auth-session,
# sitemap, health). HTML responses always go through LiveView.

[[pre-write]]
pattern   = "lib/platform_web/controllers/.*_controller(_test)?\\.(ex|exs)$"
blueprint = "phoenix-liveview/core/controller"

[[pre-write]]
pattern   = "test/platform_web/controllers/.*_controller_test\\.exs$"
blueprint = "phoenix-liveview/core/controller"

# ---------- Context modules ----------
#
# Context public API = lib/platform/<domain>/<ctx>/<ctx>.ex
# Implementation + testing rules are combined in a single blueprint.

[[pre-write]]
pattern   = "test/platform/[^/]+/[^/]+/[^/]+_test\\.exs$"
blueprint = "phoenix-liveview/core/context"

[[pre-write]]
pattern   = "lib/platform/[^/]+/[^/]+/[^/]+\\.ex$"
blueprint = "phoenix-liveview/core/context"

# ---------- Migrations (SQLite) ----------

[[pre-write]]
pattern   = "priv/repo/migrations/.*\\.exs$"
blueprint = "phoenix-liveview/core/migrations-sqlite"

# ---------- Oban workers ----------

[[pre-write]]
pattern   = "_oban_worker(_test)?\\.(ex|exs)$"
blueprint = "phoenix-liveview/libs/oban-worker"

# ---------- Anubis MCP tools ----------

[[pre-write]]
pattern   = "(lib|test)/platform/mcp/tools/"
blueprint = "phoenix-liveview/libs/anubis-mcp"

# ---------- JavaScript / TypeScript ----------

[[pre-write]]
pattern   = "assets/js/.*\\.(ts|js)$"
blueprint = "phoenix-liveview/javascript/javascript"

[[pre-write]]
pattern   = "assets/(vitest\\.config\\.ts|tsconfig\\.json)$"
blueprint = "phoenix-liveview/javascript/testing-setup"

# ============================================================================
# Post-write: warn when a source file expected to have a test is missing one.
#
# Uniform derivation: lib/<path>.ex → test/<path>_test.exs.
# Fires only for the three categories that carry their own tests:
# LiveViews, Oban workers, and context public APIs. Schemas are tested
# via their context, so they don't get a warning.
#
# Assumes the `Platform` / `PlatformWeb` root-module convention (see
# core/context.md). Projects that deviate can override in their own
# hooks.toml.
# ============================================================================

# ---------- LiveViews ----------

[[post-write]]
pattern           = "^lib/(.+)_live\\.ex$"
text              = "No test file found. Expected: test/${1}_live_test.exs — write the test before moving on."
when_file_missing = "test/${1}_live_test.exs"

# ---------- Oban workers ----------

[[post-write]]
pattern           = "^lib/(.+)_oban_worker\\.ex$"
text              = "No test file found. Expected: test/${1}_oban_worker_test.exs — write the test before moving on."
when_file_missing = "test/${1}_oban_worker_test.exs"

# ---------- Context public API (filename == parent folder) ----------

[[post-write]]
pattern           = "^lib/platform/([^/]+)/([^/]+)/\\2\\.ex$"
text              = "No test file found. Expected: test/platform/${1}/${2}/${2}_test.exs — write the test before moving on."
when_file_missing = "test/platform/${1}/${2}/${2}_test.exs"
